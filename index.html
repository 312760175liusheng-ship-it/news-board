<html lang="zh-CN">
<head>

<title>每日资讯看板</title>
<style>
  :root{ --bg:#f6f5f1; --card:#fff; --line:#e6e3da; --text:#1c1b18; --muted:#6b6a64; --hint:#9b9a92; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--text);
        font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
        line-height:1.6; padding:24px 18px 90px; }
  .wrap{ max-width:1100px; margin:0 auto; }
  header{ display:flex; justify-content:space-between; align-items:flex-end;
          flex-wrap:wrap; gap:12px; margin-bottom:18px; }
  h1{ font-size:22px; font-weight:600; margin:0; }
  .sub{ font-size:13px; color:var(--muted); margin-top:4px; }
  .pills{ display:flex; gap:6px; flex-wrap:wrap; }
  .pill{ font-size:13px; padding:6px 14px; border-radius:999px; cursor:pointer;
         border:1px solid var(--line); background:#fff; color:var(--muted);
         user-select:none; transition:.15s; }
  .pill.on{ background:#1c1b18; color:#fff; border-color:#1c1b18; }
  .sec{ margin-top:26px; }
  .sec-h{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .dot{ width:9px; height:9px; border-radius:50%; }
  .sec-h b{ font-size:15px; font-weight:600; }
  .sec-h .n{ font-size:12px; color:var(--hint); }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px;
         padding:14px 16px; display:flex; flex-direction:column; }
  .card-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .src{ font-size:11px; padding:2px 9px; border-radius:5px; font-weight:500; }
  .tag-en{ margin-left:6px; font-size:10px; color:var(--hint); border:1px solid var(--line);
           border-radius:4px; padding:0 4px; }
  .time{ font-size:11px; color:var(--hint); }
  .ttl{ font-size:15px; font-weight:600; margin:0 0 6px; line-height:1.4; }
  .smy{ font-size:13px; color:var(--muted); margin:0 0 12px; flex:1; }
  .acts{ display:flex; gap:8px; }
  .btn{ font-size:13px; padding:5px 12px; border-radius:8px; border:1px solid var(--line);
        background:#fff; color:var(--text); cursor:pointer; text-decoration:none;
        display:inline-flex; align-items:center; gap:4px; }
  .btn:hover{ background:#f0efe9; }
  .btn.faved{ background:#fff7e6; border-color:#f0c674; color:#915b00; }
  .bar{ position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line);
        padding:12px 20px; display:flex; justify-content:space-between; align-items:center;
        box-shadow:0 -2px 10px rgba(0,0,0,.05); }
  .bar span{ font-size:14px; color:var(--muted); }
  .bar .save{ background:#1c1b18; color:#fff; border:none; padding:9px 18px; }
  .empty{ color:var(--hint); font-size:14px; padding:20px 0; }
</style>
</head>

    <div class="pills" id="pills"></div>

  <div id="boards"></div>
</div>

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(md)
      .then(()=>alert("已复制 "+list.length+" 条到剪贴板！\n（下一步会做成一键直接存进知识库）"))
      .catch(fallback);
  } else { fallback(); }
}
function render(){
  const boards = document.getElementById("boards");
  boards.innerHTML = "";
  for(const cat of ORDER){
    if(filter!=="全部" && filter!==cat) continue;
    const items = DATA.filter(x=>x.category===cat);
    if(!items.length) continue;
    const sec = document.createElement("div");
    sec.className="sec";
    sec.innerHTML = `<div class="sec-h"><span class="dot" style="background:${COLORS[cat]}"></span><b>${cat}</b><span class="n">${items.length} 条</span></div>`;
    const grid = document.createElement("div");
    grid.className="grid";
    for(const it of items){
      const faved = favs[it.link];
      const card = document.createElement("div");
      card.className="card";
      card.innerHTML =
        `<div class="card-top"><span class="src" style="${srcStyle(cat)}">${it.source}`+
        `${it.lang==="en"?'<span class="tag-en">译</span>':''}</span>`+
        `<span class="time">${it.time_show||""}</span></div>`+
        `<p class="ttl">${it.title_show}</p>`+
        `<p class="smy">${it.summary_show||""}</p>`+
        `<div class="acts">`+
        `<button class="btn fav ${faved?'faved':''}">${faved?'★ 已收藏':'☆ 收藏选题'}</button>`+
        `<a class="btn" href="${it.link}" target="_blank">↗ 读原文</a></div>`;
      card.querySelector(".fav").addEventListener("click", e=>toggleFav(it.link, e.currentTarget));
      grid.appendChild(card);
    }
    sec.appendChild(grid);
    boards.appendChild(sec);
  }
  if(!boards.children.length){ boards.innerHTML='<div class="empty">这个方向今天没有新内容</div>'; }
}
function buildPills(){
  const pills = document.getElementById("pills");
  pills.innerHTML = "";
  ["全部",...ORDER].forEach(name=>{
    const p = document.createElement("span");
    p.className = "pill" + (name===filter?" on":"");
    p.textContent = name;
    p.onclick = ()=>{ filter=name; buildPills(); render(); };
    pills.appendChild(p);
  });
}
buildPills(); render(); updateFavCount();
</script>
</body>
</html>
